<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>桌面闹钟</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="./script.js" data-website-id="a2db7bef-b5fc-4fcf-8b1a-998a8b197cc3" data-host-url="http://106.53.170.171:3000/"></script>
</head>
<body>
  <div id="app">
    <div class="usage-tips" id="usage-tips">
      <div class="tips-content">
        <h3>使用提示</h3>
        <p>1. 请在插件应用设置中将插件设为「跟随主程序同时启动运行」</p>
        <p>2. 退出时不要关闭插件，使用ESC键将插件退出到后台运行</p>
      </div>
      <button class="tips-close" onclick="document.getElementById('usage-tips').style.display='none'">×</button>
    </div>
    <h2>桌面闹钟</h2>
    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('timeline')">时间轴</button>
      <button class="tab-button" onclick="switchTab('input')">创建时间块</button>
      <button class="tab-button" onclick="switchTab('settings')">参数设置</button>
      <button class="tab-button" onclick="showQuickAlarmModal()" style="background: #52c41a; color: white; border-color: #52c41a;">⚡ 快速闹钟</button>
    </div>

    <div id="timeline-tab" class="tab-content active">
      <!-- 当前任务快速显示区域 -->
      <div class="current-task-header" id="current-task-header">
        <div class="current-task-info">
          <div class="current-task-label">当前任务</div>
          <div class="current-task-content" id="current-task-content">暂无进行中的任务</div>
          <div class="current-task-time" id="current-task-time"></div>
        </div>
        <div class="next-task-info" id="next-task-info" style="display: none;">
          <div class="next-task-label">下一个任务</div>
          <div class="next-task-content" id="next-task-content"></div>
          <div class="next-task-time" id="next-task-time"></div>
        </div>
      </div>
      
      <div class="timeline">
        <div class="timeline-blocks" id="timeline-blocks"></div>
      </div>
      <div id="current-task" class="current-task" style="display: none;">当前无任务</div>
    </div>

    <div id="input-tab" class="tab-content">
      <div class="input-container">
        <div class="time-form-full-grid">
          <div class="form-input" style="grid-column: span 2;">
            <label>任务名称</label>
            <input type="text" id="task-name" placeholder="输入任务名称">
            <div id="error-task-name" class="error-message"></div>
          </div>
          <div class="form-input">
            <label>时间点</label>
            <input type="time" id="task-time" value="09:00">
            <div id="error-task-time" class="error-message"></div>
          </div>
          
          <div class="form-input">
            <label>启用状态</label>
            <input type="hidden" id="task-enabled" value="true">
            <div class="button-group">
              <button class="method-button active" data-value="true" onclick="setButtonGroupValue('task-enabled', 'true', this)">启用</button>
              <button class="method-button" data-value="false" onclick="setButtonGroupValue('task-enabled', 'false', this)">禁用</button>
            </div>
          </div>
          <div class="form-input">
            <label>预提醒</label>
            <input type="hidden" id="task-pre-alert" value="true">
            <div class="button-group">
              <button class="method-button active" data-value="true" onclick="setButtonGroupValue('task-pre-alert', 'true', this)">启用</button>
              <button class="method-button" data-value="false" onclick="setButtonGroupValue('task-pre-alert', 'false', this)">禁用</button>
            </div>
          </div>
          <div class="form-input">
             <label>提醒次数</label>
             <div style="display: flex; align-items: center; gap: 10px;">
               <input type="number" id="task-reminder-count" min="1" max="999" placeholder="输入次数" style="width: 120px; min-width: 60px;">
               <label style="margin: 0; white-space: nowrap;">
                 <input type="checkbox" id="task-reminder-permanent"> 永久提醒
               </label>
             </div>
             <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">永久:每天提醒; 次数:提醒完自动禁用</small>
             <div id="error-reminder-count" class="error-message"></div>
          </div>

          <div class="form-input" style="grid-column: 1 / -1;">
            <label>提醒模式</label>
            <input type="hidden" id="task-reminder-mode" value="daily">
            <div class="button-group">
              <button class="method-button active" data-value="daily" onclick="setButtonGroupValue('task-reminder-mode', 'daily', this)">每天</button>
              <button class="method-button" data-value="weekly" onclick="setButtonGroupValue('task-reminder-mode', 'weekly', this)">按星期</button>
            </div>
            
            <div id="weekday-selector" style="display: none; margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="margin: 0; font-size: 13px;">选择星期</label>
                <div style="display: flex; gap: 8px;">
                  <button type="button" class="tag-button" onclick="selectWeekdays('workday')">工作日</button>
                  <button type="button" class="tag-button" onclick="selectWeekdays('weekend')">周末</button>
                </div>
              </div>
              <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-1" value="1"> 周一
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-2" value="2"> 周二
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-3" value="3"> 周三
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-4" value="4"> 周四
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-5" value="5"> 周五
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-6" value="6"> 周六
                </label>
                <label style="margin: 0; display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                  <input type="checkbox" id="weekday-0" value="0"> 周日
                </label>
              </div>
              <small style="color: #666; font-size: 12px; display: block; margin-top: 8px;">请至少选择一天</small>
              <div id="error-weekdays" class="error-message"></div>
            </div>
          </div>
        </div>

        <div class="form-actions time-form-actions" style="margin-top: 15px;">
          <button class="alert-button primary" onclick="handleFormSubmit()">保存</button>
        </div>
        <div class="time-block-list" id="time-block-list"></div>
      </div>
    </div>

    <div id="settings-tab" class="tab-content">
      <div class="input-container">
        <div class="avatar-preview">
          <label>头像设置</label>
          <button class="alert-button primary" onclick="window.handleAvatarUpload()">选择头像</button>
          <img id="avatarPreview" onerror="this.src='./logo.svg'">
        </div>
        <div class="form-input">
          <label>预提醒提前时间（分钟）</label>
          <input type="number" id="pre-alert-time" min="1" max="10" value="1" onchange="handlePreAlertTimeChange()">
        </div>
        <div class="form-input">
          <label>预提醒次数</label>
          <input type="number" id="pre-alert-count" disabled>
        </div>
        <div class="form-input">
          <label>全局提醒开关(当禁用时所有提醒都将不能提醒)</label>
          <select id="global-alert-toggle" onchange="handlePreAlertTimeChange()">
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
        <div class="form-input">
          <label>提醒方式</label>
          <div style="padding: 8px 12px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; color: #495057;">
            弹窗通知（强制提醒）
          </div>
          <small style="color: #666; font-size: 12px;">
            闹钟采用弹窗通知方式，确保重要提醒不会被遗漏
          </small>
        </div>
        <div class="form-input">
          <label>铃声设置</label>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; gap: 10px; align-items: center;">
              <button class="alert-button primary" onclick="window.handleBellSoundUpload()">选择自定义铃声</button>
              <button class="alert-button secondary" onclick="window.resetToDefaultBellSound()">使用默认铃声</button>
              <button class="alert-button secondary" onclick="testBellSound()">测试铃声</button>
            </div>
            <div id="bell-sound-status" style="font-size: 12px; color: #666;">当前: 默认铃声</div>
            <small style="color: #666; font-size: 12px;">支持 MP3、WAV、OGG、M4A、AAC 格式的音频文件</small>
          </div>
        </div>
        
        <div class="form-input">
          <label>悬浮窗</label>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; gap: 10px; align-items: center;">
              <button class="alert-button primary" onclick="if(window.openFloatingWindow) { window.openFloatingWindow(); }">显示悬浮窗</button>
              <button class="alert-button secondary" onclick="if(window.closeFloatingWindow) { window.closeFloatingWindow(); }" style="background: #ff4d4f; color: white;">关闭悬浮窗</button>
            </div>
            <div style="margin-top: 5px;">
              <label style="font-size: 14px; margin-bottom: 5px; display: block;">悬浮窗透明度</label>
              <div style="display: flex; align-items: center; gap: 10px;">
                <input type="range" id="floating-opacity" min="0.1" max="1.0" step="0.1" style="flex: 1;" onchange="window.handleFloatingOpacityChange(this.value)" oninput="document.getElementById('opacity-value').textContent = this.value">
                <span id="opacity-value" style="width: 30px; text-align: right;">0.8</span>
              </div>
            </div>
            <small style="color: #666; font-size: 12px;">开启后，桌面会显示悬浮窗，前面是倒计时，后面是任务名。</small>
          </div>
        </div>

      </div>
    </div>
    
    
  </div>

  <div class="alert-overlay" id="alert-overlay">
    <div class="alert-content">
      <h3 id="alert-title"></h3>
      <p id="alert-message"></p>
      <div class="alert-actions">
        <button class="alert-button primary" onclick="handleAlertAction('complete')">完成</button>
        <button class="alert-button secondary" onclick="handleAlertAction('delay')">延迟10分钟</button>
      </div>
    </div>
  </div>

  <div class="side-alert" id="side-alert">
    <p id="side-alert-message"></p>
  </div>

  <!-- 轻量级操作提示 -->
  <div class="toast-notification" id="toast-notification">
    <div class="toast-content">
      <span class="toast-icon">✓</span>
      <span class="toast-message" id="toast-message"></span>
    </div>
  </div>

  <div class="alert-overlay" id="quick-alarm-modal">
    <div class="alert-content">
      <h3>⚡ 快速闹钟</h3>
      <div class="form-input">
        <label>提醒事项</label>
        <input type="text" id="quick-alarm-name" placeholder="做什么事情？">
      </div>
      <div class="form-input">
        <label>提醒时间</label>
        <input type="time" id="quick-alarm-time">
      </div>
      <div class="alert-actions">
        <button class="alert-button secondary" onclick="closeQuickAlarmModal()">取消</button>
        <button class="alert-button primary" onclick="saveQuickAlarm()">确定</button>
      </div>
    </div>
  </div>

  <script>
    // 按钮组值设置辅助函数
    function setButtonGroupValue(inputId, value, btnElement) {
      document.getElementById(inputId).value = value;
      const group = btnElement.parentElement;
      group.querySelectorAll('.method-button').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      
      if (inputId === 'task-reminder-mode') {
        toggleWeekdaySelector();
      }
    }

    // 更新按钮组视觉状态
    function updateButtonGroupVisuals(inputId) {
      const value = document.getElementById(inputId).value;
      const input = document.getElementById(inputId);
      const group = input.nextElementSibling;
      if (group && group.classList.contains('button-group')) {
         group.querySelectorAll('.method-button').forEach(btn => {
            if (btn.dataset.value === value) {
               btn.classList.add('active');
            } else {
               btn.classList.remove('active');
            }
         });
      }
    }

    // 显示表单提示
    function showFormAlert(title, message) {
      const overlay = document.getElementById('alert-overlay');
      const alertTitle = document.getElementById('alert-title');
      const alertMessage = document.getElementById('alert-message');
      const alertActions = document.querySelector('.alert-actions');
      
      alertTitle.textContent = title;
      alertMessage.textContent = message;
      
      // 修改按钮
      alertActions.innerHTML = `
        <button class="alert-button primary" onclick="document.getElementById('alert-overlay').style.display = 'none'">确定</button>
      `;
      
      overlay.style.display = 'flex';
    }

    // 切换标签页
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`${tabId}-tab`).classList.add('active');
      document.querySelector(`.tab-button[onclick="switchTab('${tabId}')"]`).classList.add('active');
    }

    // 切换星期选择器显示/隐藏
    function toggleWeekdaySelector() {
      const reminderMode = document.getElementById('task-reminder-mode').value;
      const weekdaySelector = document.getElementById('weekday-selector');
      
      if (reminderMode === 'weekly') {
        weekdaySelector.style.display = 'block';
      } else {
        weekdaySelector.style.display = 'none';
        // 清空星期选择
        document.querySelectorAll('[id^="weekday-"]').forEach(checkbox => {
          checkbox.checked = false;
        });
      }
    }

    // 快捷选择星期
    function selectWeekdays(type) {
      // 先清空所有
      document.querySelectorAll('[id^="weekday-"]').forEach(checkbox => {
        checkbox.checked = false;
      });

      if (type === 'workday') {
        // 选中周一到周五 (1-5)
        [1, 2, 3, 4, 5].forEach(day => {
          const checkbox = document.getElementById(`weekday-${day}`);
          if (checkbox) checkbox.checked = true;
        });
      } else if (type === 'weekend') {
        // 选中周六和周日 (6, 0)
        [6, 0].forEach(day => {
          const checkbox = document.getElementById(`weekday-${day}`);
          if (checkbox) checkbox.checked = true;
        });
      }
    }

    // 快速闹钟相关功能
    function showQuickAlarmModal() {
      const modal = document.getElementById('quick-alarm-modal');
      const timeInput = document.getElementById('quick-alarm-time');
      const nameInput = document.getElementById('quick-alarm-name');
      
      // 设置默认时间为当前时间后30分钟
      const now = new Date();
      now.setMinutes(now.getMinutes() + 30);
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      
      timeInput.value = `${hours}:${minutes}`;
      nameInput.value = '';
      nameInput.focus();
      
      modal.style.display = 'flex';
    }

    function closeQuickAlarmModal() {
      document.getElementById('quick-alarm-modal').style.display = 'none';
    }

    function saveQuickAlarm() {
      const name = document.getElementById('quick-alarm-name').value.trim();
      const timeStr = document.getElementById('quick-alarm-time').value;
      
      if (!name) {
        alert('请输入提醒事项');
        return;
      }
      
      if (!timeStr) {
        alert('请输入提醒时间');
        return;
      }
      
      const [hours, minutes] = timeStr.split(':').map(Number);
      const now = new Date();
      let targetTime = new Date();
      targetTime.setHours(hours, minutes, 0, 0);
      
      // 如果时间已过，自动设为明天
      if (targetTime <= now) {
        targetTime.setDate(targetTime.getDate() + 1);
      }
      
      const newBlock = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2),
        task: name,
        startTime: targetTime.getTime(),
        enabled: true,
        preAlert: false, // 快速闹钟不预提醒
        reminderMode: 'once', // 单次提醒
        reminderCount: 1,
        remainingCount: 1,
        weekdays: [],
        color: getRandomColor(),
        createdAt: Date.now()
      };
      
      const blocks = window.getTimeSettings();
      blocks.push(newBlock);
      window.saveTimeSettings(blocks);
      
      renderTimeline();
      renderTimeBlockList();
      closeQuickAlarmModal();
      
      if (window.showToast) {
        window.showToast('快速闹钟已添加');
      } else {
        alert('快速闹钟已添加');
      }
    }




    // 渲染时间轴
    function renderTimeline() {
      const container = document.getElementById('timeline-blocks');
      const timeBlocks = window.getTimeSettings();
      container.innerHTML = '';
      
      // 按时间排序（按小时和分钟）
      timeBlocks.sort((a, b) => {
        const timeA = new Date(a.startTime);
        const timeB = new Date(b.startTime);
        const hoursA = timeA.getHours();
        const minutesA = timeA.getMinutes();
        const hoursB = timeB.getHours();
        const minutesB = timeB.getMinutes();
        
        // 先按小时排序，再按分钟排序
        if (hoursA !== hoursB) {
          return hoursA - hoursB;
        }
        return minutesA - minutesB;
      });
      
      timeBlocks.forEach(block => {
        const blockStartTime = new Date(block.startTime);
        const blockEl = document.createElement('div');
        blockEl.className = 'timeline-block';
        
        // 判断是否为当前正在进行的任务
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const blockTime = blockStartTime.getHours() * 60 + blockStartTime.getMinutes();
        
        // 找到当前时间之前最近的任务作为正在进行的任务
        const enabledBlocks = timeBlocks.filter(b => {
          if (!b.enabled) return false;
          
          // 检查星期提醒模式
          const reminderMode = b.reminderMode || 'daily';
          if (reminderMode === 'weekly') {
            const currentWeekday = now.getDay(); // 0=周日, 1=周一, ..., 6=周六
            const weekdays = b.weekdays || [];
            return weekdays.includes(currentWeekday); // 只有今天在选定星期内才考虑
          }
          return true; // 每日提醒模式
        });
        
        const pastBlocks = enabledBlocks.filter(b => {
          const bTime = new Date(b.startTime);
          const bTimeMinutes = bTime.getHours() * 60 + bTime.getMinutes();
          return bTimeMinutes <= currentTime;
        });
        
        let currentTaskBlock = null;
        if (pastBlocks.length > 0) {
          // 找到时间最接近当前时间的已过去任务
          currentTaskBlock = pastBlocks.reduce((latest, current) => {
            const latestTime = new Date(latest.startTime);
            const currentTimeBlock = new Date(current.startTime);
            const latestMinutes = latestTime.getHours() * 60 + latestTime.getMinutes();
            const currentMinutes = currentTimeBlock.getHours() * 60 + currentTimeBlock.getMinutes();
            return currentMinutes > latestMinutes ? current : latest;
          });
        }
        
        const isCurrentTask = currentTaskBlock && currentTaskBlock.id === block.id;
        
        // 显示时间和任务名称
        const timeStr = blockStartTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        // 兼容性处理：为旧数据设置默认值
        const reminderCount = block.reminderCount !== undefined ? block.reminderCount : -1;
        const remainingCount = block.remainingCount !== undefined ? block.remainingCount : reminderCount;
        const reminderText = reminderCount === -1 ? '永久' : `剩余${remainingCount}次`;
        
        // 获取提醒模式信息
        const reminderMode = block.reminderMode || 'daily';
        let reminderModeText = '每日';
        if (reminderMode === 'weekly') {
          const weekdays = block.weekdays || [];
          const weekNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
          const selectedDays = weekdays.map(day => weekNames[day]).join('、');
          reminderModeText = `每周(${selectedDays})`;
        } else if (reminderMode === 'once') {
          reminderModeText = '单次';
        }
        
        // 构建新的树状时间轴HTML结构
         blockEl.innerHTML = `
           <div class="timeline-content">
             <div class="timeline-color-indicator" style="background: ${block.color}"></div>
             <div class="timeline-text">
               <div class="timeline-header">
                 <div class="timeline-time">${timeStr}</div>
                 <div class="timeline-task">${block.task}</div>
               </div>
               <div class="timeline-status">
                 ${block.enabled ? '已启用' : '已禁用'} | 
                 预提醒：${block.preAlert ? '已启用' : '已禁用'} | 
                 提醒：${reminderText} | 
                 模式：${reminderModeText}
               </div>
               ${isCurrentTask ? '<div class="timeline-current-indicator">🔥 进行中</div>' : ''}
             </div>
             <div class="timeline-actions">
               <button class="timeline-delete-button" onclick="event.stopPropagation(); removeTimeBlock('${block.id}')">删除</button>
             </div>
           </div>
         `;
        
        // 根据状态设置样式类
        if (!block.enabled) {
          blockEl.classList.add('disabled');
        }
        
        // 为当前正在进行的任务添加特殊样式
        if (isCurrentTask) {
          blockEl.classList.add('current-task');
        }
        
        blockEl.onclick = () => {
          const logger = window.logger || { log: console.log.bind(console) };
          logger.log('时间块点击事件触发:', block);
          window.alertManager.startTimeBlock(block);
        };

        container.appendChild(blockEl);
      });
      
      // 更新当前任务头部显示
      updateCurrentTaskHeader(timeBlocks);
    }

    /**
     * 更新当前任务头部显示区域
     * @param {Array} timeBlocks - 时间块数组
     * @date 2024-01-20
     */
    function updateCurrentTaskHeader(timeBlocks) {
      const currentTaskContent = document.getElementById('current-task-content');
      const currentTaskTime = document.getElementById('current-task-time');
      const nextTaskInfo = document.getElementById('next-task-info');
      const nextTaskContent = document.getElementById('next-task-content');
      const nextTaskTime = document.getElementById('next-task-time');
      
      const now = new Date();
      const currentTime = now.getHours() * 60 + now.getMinutes();
      
      // 找到当前正在进行的任务
      const enabledBlocks = timeBlocks.filter(b => {
        if (!b.enabled) return false;
        
        // 检查星期提醒模式
        const reminderMode = b.reminderMode || 'daily';
        if (reminderMode === 'weekly') {
          const currentWeekday = now.getDay();
          const weekdays = b.weekdays || [];
          return weekdays.includes(currentWeekday);
        }
        return true;
      });
      
      const pastBlocks = enabledBlocks.filter(b => {
        const bTime = new Date(b.startTime);
        const bTimeMinutes = bTime.getHours() * 60 + bTime.getMinutes();
        return bTimeMinutes <= currentTime;
      });
      
      let currentTaskBlock = null;
      if (pastBlocks.length > 0) {
        currentTaskBlock = pastBlocks.reduce((latest, current) => {
          const latestTime = new Date(latest.startTime);
          const currentTimeBlock = new Date(current.startTime);
          const latestMinutes = latestTime.getHours() * 60 + latestTime.getMinutes();
          const currentMinutes = currentTimeBlock.getHours() * 60 + currentTimeBlock.getMinutes();
          return currentMinutes > latestMinutes ? current : latest;
        });
      }
      
      // 找到下一个任务
      const futureBlocks = enabledBlocks.filter(b => {
        const bTime = new Date(b.startTime);
        const bTimeMinutes = bTime.getHours() * 60 + bTime.getMinutes();
        return bTimeMinutes > currentTime;
      });
      
      let nextTaskBlock = null;
      if (futureBlocks.length > 0) {
        nextTaskBlock = futureBlocks.reduce((earliest, current) => {
          const earliestTime = new Date(earliest.startTime);
          const currentTimeBlock = new Date(current.startTime);
          const earliestMinutes = earliestTime.getHours() * 60 + earliestTime.getMinutes();
          const currentMinutes = currentTimeBlock.getHours() * 60 + currentTimeBlock.getMinutes();
          return currentMinutes < earliestMinutes ? current : earliest;
        });
      }
      
      // 更新当前任务显示
      if (currentTaskBlock) {
        const startTime = new Date(currentTaskBlock.startTime);
        const timeStr = startTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const elapsed = Math.floor((currentTime - (startTime.getHours() * 60 + startTime.getMinutes())));
        
        currentTaskContent.textContent = currentTaskBlock.task;
        currentTaskTime.textContent = `${timeStr} 开始 (已进行 ${elapsed} 分钟)`;
      } else {
        currentTaskContent.textContent = '暂无进行中的任务';
        currentTaskTime.textContent = '';
      }
      
      // 更新下一个任务显示
      if (nextTaskBlock) {
        const startTime = new Date(nextTaskBlock.startTime);
        const timeStr = startTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const remaining = (startTime.getHours() * 60 + startTime.getMinutes()) - currentTime;
        
        nextTaskContent.textContent = nextTaskBlock.task;
        nextTaskTime.textContent = `${timeStr} 开始 (还有 ${remaining} 分钟)`;
        nextTaskInfo.style.display = 'block';
      } else {
        nextTaskInfo.style.display = 'none';
      }
    }

    // 处理提醒操作
    function handleAlertAction(action) {
      window.alertManager.handleAction(action);
      renderTimeline();
    }
    // 渲染时间块列表
    function renderTimeBlockList() {
      const container = document.getElementById('time-block-list');
      const timeBlocks = window.getTimeSettings();
      
      container.innerHTML = timeBlocks.map(block => {
        const date = new Date(block.startTime);
        const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        
        // 判断是否为当前正在进行的任务
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const blockTime = date.getHours() * 60 + date.getMinutes();
        
        // 找到当前时间之前最近的任务作为正在进行的任务
        const enabledBlocks = timeBlocks.filter(b => {
          if (!b.enabled) return false;
          
          // 检查星期提醒模式
          const reminderMode = b.reminderMode || 'daily';
          if (reminderMode === 'weekly') {
            const currentWeekday = now.getDay(); // 0=周日, 1=周一, ..., 6=周六
            const weekdays = b.weekdays || [];
            return weekdays.includes(currentWeekday); // 只有今天在选定星期内才考虑
          }
          return true; // 每日提醒模式
        });
        
        const pastBlocks = enabledBlocks.filter(b => {
          const bTime = new Date(b.startTime);
          const bTimeMinutes = bTime.getHours() * 60 + bTime.getMinutes();
          return bTimeMinutes <= currentTime;
        });
        
        let currentTaskBlock = null;
        if (pastBlocks.length > 0) {
          // 找到时间最接近当前时间的已过去任务
          currentTaskBlock = pastBlocks.reduce((latest, current) => {
            const latestTime = new Date(latest.startTime);
            const currentTimeBlock = new Date(current.startTime);
            const latestMinutes = latestTime.getHours() * 60 + latestTime.getMinutes();
            const currentMinutes = currentTimeBlock.getHours() * 60 + currentTimeBlock.getMinutes();
            return currentMinutes > latestMinutes ? current : latest;
          });
        }
        
        const isCurrentTask = currentTaskBlock && currentTaskBlock.id === block.id;
        
        // 为当前任务添加特殊样式类和标识
        const currentTaskClass = isCurrentTask ? ' current-task' : '';
        const currentTaskIndicator = isCurrentTask ? ' 🔥 进行中' : '';
        
        return `
          <div class="time-block-item${currentTaskClass}" data-id="${block.id}">
            <div class="time-block-info">
              <div class="time-block-color" style="background: ${block.color}"></div>
              <div class="time-block-details">
                <strong>${block.task}${currentTaskIndicator}</strong>
                <span>${timeStr}</span>
                <span class="status-indicator">
                  ${block.enabled ? '已启用' : '已禁用'} | 
                  预提醒：${block.preAlert ? '已启用' : '已禁用'} | 
                  提醒：${(block.reminderCount !== undefined ? block.reminderCount : -1) === -1 ? '永久' : `剩余${block.remainingCount !== undefined ? block.remainingCount : (block.reminderCount !== undefined ? block.reminderCount : -1)}次`} | 
                  模式：${(() => {
                    const mode = block.reminderMode || 'daily';
                    if (mode === 'daily') return '每日';
                    if (mode === 'once') return '单次';
                    if (mode === 'weekly') {
                      const weekdays = block.weekdays || [];
                      const weekNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                      const selectedDays = weekdays.map(day => weekNames[day]).join('、');
                      return `每周(${selectedDays})`;
                    }
                    return mode;
                  })()}
                </span>
              </div>
            </div>
            <div class="time-block-actions">
              <button class="edit" onclick="editTimeBlock('${block.id}')">编辑</button>
              <button class="delete" onclick="removeTimeBlock('${block.id}')">删除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 编辑时间块
    function editTimeBlock(id) {
      const timeBlocks = window.getTimeSettings();
      const block = timeBlocks.find(b => b.id === id);
      if (!block) return;

      const date = new Date(block.startTime);
      const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

      document.getElementById('task-name').value = block.task;
      document.getElementById('task-time').value = timeStr;
      document.getElementById('task-enabled').value = block.enabled ? 'true' : 'false';
      updateButtonGroupVisuals('task-enabled');
      document.getElementById('task-pre-alert').value = block.preAlert ? 'true' : 'false';
      updateButtonGroupVisuals('task-pre-alert');
      
      // 设置提醒次数
      if (block.reminderCount === -1) {
        document.getElementById('task-reminder-permanent').checked = true;
        document.getElementById('task-reminder-count').value = '';
      } else {
        document.getElementById('task-reminder-permanent').checked = false;
        document.getElementById('task-reminder-count').value = block.reminderCount || '';
      }
      
      // 设置提醒模式和星期选择
      const reminderMode = block.reminderMode || 'daily';
      document.getElementById('task-reminder-mode').value = reminderMode;
      updateButtonGroupVisuals('task-reminder-mode');
      
      // 清空所有星期选择
      document.querySelectorAll('[id^="weekday-"]').forEach(checkbox => {
        checkbox.checked = false;
      });
      
      // 如果是星期提醒模式，回填选中的星期
      if (reminderMode === 'weekly' && block.weekdays && block.weekdays.length > 0) {
        block.weekdays.forEach(day => {
          const checkbox = document.getElementById(`weekday-${day}`);
          if (checkbox) {
            checkbox.checked = true;
          }
        });
      }
      
      toggleWeekdaySelector();
      window.currentEditingBlockId = id;
      
      // 切换到表单输入模式
      switchTab('input');
    }

    // 删除时间块
    function removeTimeBlock(id) {
      const timeBlocks = window.getTimeSettings();
      const block = timeBlocks.find(b => b.id === id);
      const blockName = block && block.task ? `"${block.task}"` : '该时间块';
      if (!window.confirm(`确认删除 ${blockName} 吗？`)) {
        return;
      }

      // 删除数据并更新界面
      window.deleteTimeBlock(id);
      
      // 更新界面
      renderTimeBlockList();
      renderTimeline();
      
      // 清空表单
      window.currentEditingBlockId = null;
      const taskNameInput = document.getElementById('task-name');
      const taskTimeInput = document.getElementById('task-time');
      
      if (taskNameInput) taskNameInput.value = '';
      if (taskTimeInput) taskTimeInput.value = '09:00';
      document.getElementById('task-enabled').value = 'true';
      updateButtonGroupVisuals('task-enabled');
      document.getElementById('task-pre-alert').value = 'true';
      updateButtonGroupVisuals('task-pre-alert');
      document.getElementById('task-reminder-count').value = '';
      document.getElementById('task-reminder-permanent').checked = false;
    }

    // 显示错误信息
    function showError(elementId, message) {
      const errorDiv = document.getElementById('error-' + elementId);
      let inputId = elementId;
      
      if (elementId === 'reminder-count') inputId = 'task-reminder-count';
      if (elementId === 'weekdays') inputId = 'weekday-selector';
      
      const inputEl = document.getElementById(inputId);
      
      if (errorDiv) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
      }
      
      if (inputEl) {
        inputEl.classList.add('error');
        // 添加输入监听以清除错误
        const clearHandler = function() {
          if (errorDiv) errorDiv.style.display = 'none';
          inputEl.classList.remove('error');
          inputEl.removeEventListener('input', clearHandler);
          inputEl.removeEventListener('change', clearHandler);
        };
        inputEl.addEventListener('input', clearHandler);
        inputEl.addEventListener('change', clearHandler);
      }
    }

    // 清除所有错误
    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(div => {
        div.style.display = 'none';
        div.textContent = '';
      });
      document.querySelectorAll('.form-input input, .form-input select, #weekday-selector').forEach(el => {
        el.classList.remove('error');
      });
    }

    // 处理可视化表单提交
    function handleFormSubmit() {
      clearErrors();
      
      const taskName = document.getElementById('task-name').value.trim();
      const taskTime = document.getElementById('task-time').value.trim();
      const enabled = document.getElementById('task-enabled').value === 'true';
      const preAlert = document.getElementById('task-pre-alert').value === 'true';
      const reminderCount = document.getElementById('task-reminder-count').value.trim();
      const reminderPermanent = document.getElementById('task-reminder-permanent').checked;
      const reminderMode = document.getElementById('task-reminder-mode').value;

      let hasError = false;

      // 表单验证
      if (!taskName) {
        showError('task-name', '请输入任务名称');
        hasError = true;
      }
      if (!taskTime || !/^\d{1,2}:\d{2}$/.test(taskTime)) {
        showError('task-time', '请输入正确的时间格式（如：09:00）');
        hasError = true;
      }
      
      // 提醒次数验证
      if (!reminderPermanent && (!reminderCount || isNaN(reminderCount) || parseInt(reminderCount) < 1)) {
        showError('reminder-count', '请输入有效的提醒次数（大于0的整数）或选择永久提醒');
        hasError = true;
      }

      // 星期提醒验证
      let weekdays = [];
      if (reminderMode === 'weekly') {
        const checkedWeekdays = document.querySelectorAll('[id^="weekday-"]:checked');
        if (checkedWeekdays.length === 0) {
          showError('weekdays', '按星期提醒模式下，请至少选择一天');
          hasError = true;
        }
        weekdays = Array.from(checkedWeekdays).map(cb => parseInt(cb.value));
      }

      const [hours, minutes] = taskTime.split(':').map(Number);
      if (!hasError && (hours < 0 || hours > 23 || minutes < 0 || minutes > 59)) {
        showError('task-time', '请输入有效的时间范围（00:00-23:59）');
        hasError = true;
      }

      if (hasError) return;

      const blocks = window.getTimeSettings();
      const newBlock = {
        task: taskName,
        startTime: new Date().setHours(hours, minutes, 0, 0),
        enabled,
        preAlert,
        reminderCount: reminderPermanent ? -1 : parseInt(reminderCount),
        remainingCount: reminderPermanent ? -1 : parseInt(reminderCount),
        reminderMode: reminderMode,
        weekdays: reminderMode === 'weekly' ? weekdays : [],
        color: getRandomColor()
      };

      if (window.currentEditingBlockId) {
        // 更新现有时间块
        if (window.updateTimeBlock(window.currentEditingBlockId, newBlock)) {
          window.currentEditingBlockId = null;
        }
      } else {
        // 添加新时间块
        blocks.push(newBlock);
        window.saveTimeSettings(blocks);
      }

      renderTimeline();
      renderTimeBlockList();
      clearForm();
    }

    // 清空表单
    function clearForm() {
      clearErrors();
      document.getElementById('task-name').value = '';
      document.getElementById('task-time').value = '09:00';
      document.getElementById('task-enabled').value = 'true';
      updateButtonGroupVisuals('task-enabled');
      document.getElementById('task-pre-alert').value = 'true';
      updateButtonGroupVisuals('task-pre-alert');
      document.getElementById('task-reminder-count').value = '';
      document.getElementById('task-reminder-permanent').checked = false;
      document.getElementById('task-reminder-mode').value = 'daily';
      updateButtonGroupVisuals('task-reminder-mode');
      document.querySelectorAll('[id^="weekday-"]').forEach(checkbox => {
        checkbox.checked = false;
      });
      toggleWeekdaySelector();
    }



    // 获取随机颜色
    function getRandomColor() {
      const colors = ['#1890ff', '#52c41a', '#faad14', '#f5222d', '#722ed1'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // 测试铃声功能
    function testBellSound() {
      if (window.playBellSound) {
        window.playBellSound();
        showFormAlert('铃声测试', '铃声播放完成！如果没有听到声音，请检查系统音量设置。');
      } else {
        showFormAlert('错误', '铃声功能未初始化，请重新加载页面。');
      }
    }

    // 初始化应用
    function initApp() {
      renderTimeline();
      renderTimeBlockList();

      // 每分钟刷新一次界面，确保当前任务高亮状态实时更新
      setInterval(() => {
        renderTimeline();
        renderTimeBlockList();
      }, 60000); // 60秒刷新一次
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('app').style.display = 'block';

      // 监听提醒次数输入，如果有输入则自动取消永久提醒
      const reminderCountInput = document.getElementById('task-reminder-count');
      const reminderPermanentCheckbox = document.getElementById('task-reminder-permanent');

      if (reminderCountInput && reminderPermanentCheckbox) {
        reminderCountInput.addEventListener('input', function() {
          if (this.value) {
            reminderPermanentCheckbox.checked = false;
          }
        });

        reminderPermanentCheckbox.addEventListener('change', function() {
          if (this.checked) {
            reminderCountInput.value = '';
          }
        });
      }

      // 添加调试信息（安全检查日志管理器是否已加载）
      const logger = window.logger || { log: console.log.bind(console), error: console.error.bind(console) };
      logger.log('DOM加载完成');
      logger.log('getTimeSettings存在:', !!window.getTimeSettings);
      logger.log('alertManager存在:', !!window.alertManager);
  
      
      // 检查是否在uTools环境中
      const isInUTools = window.utools !== undefined;
      logger.log('是否在uTools环境中:', isInUTools);
      
      // 如果不在uTools环境中，提供模拟数据用于测试
        if (!isInUTools) {
          logger.log('非uTools环境，使用模拟数据');
        window.getTimeSettings = window.getTimeSettings || function() {
          return [
            {
              task: '测试任务1',
              startTime: new Date().setHours(10, 0, 0, 0),
              color: '#1890ff',
              enabled: true,
              status: 'pending',
              duration: 30,
              id: 'test1'
            },
            {
              task: '测试任务2',
              startTime: new Date().setHours(14, 0, 0, 0),
              color: '#52c41a',
              enabled: true,
              status: 'pending',
              duration: 45,
              id: 'test2'
            }
          ];
        };
        
        window.alertManager = window.alertManager || {
          startTimeBlock: function(block) {
            alert('开始任务: ' + block.task);
          },
          handleAction: function(action) {
              logger.log('执行操作:', action);
            }
        };
      }
      
      if (window.getTimeSettings && window.alertManager) {
        initApp();
      } else {
          logger.error('初始化失败: getTimeSettings或alertManager未定义');
        }
    });
  </script>
